name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy FE
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🚀 Start deploy frontend..."

            # ===== LOAD NODE (NVM) =====
            export NVM_DIR="$HOME/.nvm"
            source $NVM_DIR/nvm.sh

            # ===== FIX PATH =====
            export PATH=$PATH:/usr/local/bin

            # ===== FIX SSH GIT =====
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed255s19 -o StrictHostKeyChecking=no"

            # ===== GO TO PROJECT =====
            cd /root/neo-fiugure/frontend-neo-figure

            git pull origin main

            # ===== BUILD =====
            npm install
            npm run build

            # ===== RUN =====
            pm2 restart fe || pm2 start "npx serve -s dist -l 3006" --name fe

            echo "✅ Deploy frontend done"
